# ═══════════════════════════════════════════════════════════════════════════════
# AmneziaWG Architect — CI/CD Pipeline
#
# Architecture:
#
#   ┌──────────┐     ┌───────────┐     ┌──────────────┐
#   │  lint &  │     │   build   │     │   deploy     │
#   │  test    ├────►│ + bundle  ├──┬─►│  gh-pages    │
#   └──────────┘     └───────────┘  │  └──────────────┘
#                                   │  ┌──────────────┐
#                                   ├─►│  release     │
#                                   │  └──────────────┘
#                                   │  ┌──────────────┐
#                                   └─►│  standalone  │
#                                      │  artifact    │
#                                      └──────────────┘
#
# - lint+test and build run in PARALLEL (both need install, but test doesn't
#   need build output and build doesn't need test results)
# - deploy + release fan out from build (parallel when tag push)
# - standalone artifact is always uploaded from build
# ═══════════════════════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug logging"
        required: false
        default: "false"
        type: boolean
      skip_deploy:
        description: "Skip deployment (build + test only)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  BUN_VERSION: latest
  NODE_ENV: production

# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint & Test (runs in parallel with build)
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Lint, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Type-check
        run: bun vue-tsc --noEmit

      - name: 🧪 Run tests with coverage
        run: bun run test:coverage

      - name: 📊 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: 📋 Test summary
        if: always()
        run: |
          echo "### 🧪 Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(cat coverage/coverage-summary.json | python3 -c "import sys,json; d=json.load(sys.stdin)['total']['lines']; print(f\"{d['pct']}%\")" 2>/dev/null || echo "N/A")
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Line coverage | ${LINES} |" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build (runs in parallel with test)
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      build-time: ${{ steps.meta.outputs.build-time }}
      dist-size: ${{ steps.meta.outputs.dist-size }}
      file-count: ${{ steps.meta.outputs.file-count }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Production build
        run: bun run build

      - name: 📋 Copy launcher scripts
        run: |
          cp scripts/serve.sh dist/serve.sh
          cp scripts/serve.ps1 dist/serve.ps1
          cp scripts/serve.bat dist/serve.bat
          chmod +x dist/serve.sh

      - name: 📊 Collect metadata
        id: meta
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DIST_SIZE=$(du -sh dist | cut -f1)
          FILE_COUNT=$(find dist -type f | wc -l | tr -d ' ')
          VERSION=$(cat package.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")

          echo "build-time=$BUILD_TIME"  >> "$GITHUB_OUTPUT"
          echo "dist-size=$DIST_SIZE"    >> "$GITHUB_OUTPUT"
          echo "file-count=$FILE_COUNT"  >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"        >> "$GITHUB_OUTPUT"

          echo "### 🔨 Build Metadata" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build time | ${BUILD_TIME} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dist size | ${DIST_SIZE} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Files | ${FILE_COUNT} |" >> "$GITHUB_STEP_SUMMARY"

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: 📦 Upload standalone artifact
        uses: actions/upload-artifact@v7
        with:
          name: amneziawg-architect-v${{ steps.meta.outputs.version }}
          path: |
            dist/
            scripts/
          retention-days: 30

      - name: 📦 Upload dist for release
        if: github.ref_type == 'tag'
        uses: actions/upload-artifact@v7
        with:
          name: dist-release
          path: dist
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to GitHub Pages
  #   Runs after BOTH test + build pass (on branch push only)
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to GitHub Pages
    if: |
      github.ref_type == 'branch' &&
      github.event_name != 'pull_request' &&
      inputs.skip_deploy != 'true'
    needs: [test, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: 🌐 Deploy
        id: deploy
        uses: actions/deploy-pages@v4

      - name: 📋 Summary
        run: |
          echo "### 🚀 Deployed to GitHub Pages" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | ${{ steps.deploy.outputs.page_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ needs.build.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Built at | ${{ needs.build.outputs.build-time }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Size | ${{ needs.build.outputs.dist-size }} (${{ needs.build.outputs.file-count }} files) |" >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — Create GitHub Release
  #   Runs after BOTH test + build pass (on tag push only)
  #   Parallel with deploy (when tag also triggers deploy)
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: 🏷️ GitHub Release
    if: github.ref_type == 'tag'
    needs: [test, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📦 Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist-release
          path: dist

      - name: 🗜️ Create archives
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ needs.build.outputs.version }}"

          # ZIP and TAR.GZ of dist
          zip -r "amneziawg-architect-${TAG}.zip" dist/ scripts/
          tar -czf "amneziawg-architect-${TAG}.tar.gz" dist/ scripts/

          echo "✅ Archives:"
          ls -lh amneziawg-architect-${TAG}.*

      - name: 📝 Generate release notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ needs.build.outputs.version }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -n 1)

          {
            echo "## AmneziaWG Architect ${TAG}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Version** | \`${VERSION}\` |"
            echo "| **Built at** | ${{ needs.build.outputs.build-time }} |"
            echo "| **Dist size** | ${{ needs.build.outputs.dist-size }} (${{ needs.build.outputs.file-count }} files) |"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since \`${PREV_TAG}\`"
              echo ""
              # Group by conventional commit prefix
              for prefix in feat fix refactor perf test docs style chore; do
                COMMITS=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges | grep -i "^- ${prefix}" || true)
                if [ -n "$COMMITS" ]; then
                  case $prefix in
                    feat)     LABEL="Features" ;;
                    fix)      LABEL="Bug Fixes" ;;
                    refactor) LABEL="Refactoring" ;;
                    perf)     LABEL="Performance" ;;
                    test)     LABEL="Tests" ;;
                    docs)     LABEL="Documentation" ;;
                    style)    LABEL="Styling" ;;
                    chore)    LABEL="Maintenance" ;;
                  esac
                  echo "### ${LABEL}"
                  echo "$COMMITS"
                  echo ""
                fi
              done

              # Uncategorized commits
              OTHER=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges | grep -iv "^- \(feat\|fix\|refactor\|perf\|test\|docs\|style\|chore\)" || true)
              if [ -n "$OTHER" ]; then
                echo "### Other"
                echo "$OTHER"
                echo ""
              fi
            else
              echo "## Initial release"
              echo ""
              git log --pretty=format:"- %s (%h)" --no-merges | head -30
              echo ""
            fi

            echo ""
            echo "## Quick Start"
            echo ""
            echo "Download the archive, extract, and run:"
            echo ""
            echo '```bash'
            echo "# Linux / macOS"
            echo "./scripts/serve.sh"
            echo ""
            echo "# Windows (PowerShell)"
            echo ".\\scripts\\serve.ps1"
            echo ""
            echo "# Windows (CMD)"
            echo "scripts\\serve.bat"
            echo '```'
            echo ""
            echo "The script auto-detects bun/npm/python or installs bun."
          } > RELEASE_NOTES.md

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AmneziaWG Architect ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: false
          files: |
            amneziawg-architect-${{ github.ref_name }}.zip
            amneziawg-architect-${{ github.ref_name }}.tar.gz

      - name: 📋 Summary
        run: |
          echo "### 🏷️ Release \`${{ github.ref_name }}\` created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| amneziawg-architect-${{ github.ref_name }}.zip | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| amneziawg-architect-${{ github.ref_name }}.tar.gz | ✅ |" >> "$GITHUB_STEP_SUMMARY"
